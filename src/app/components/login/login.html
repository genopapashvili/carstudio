<div class="login-container">
  <mat-card>
    <mat-card-content>
      @let _error = error() ;
      @if (_error) {
        <p class="error">{{ _error }}</p>
      }
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input [formControl]="loginControl.controls.username" matInput type="text">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input [formControl]="loginControl.controls.password" matInput type="password">
      </mat-form-field>
    </mat-card-content>
    <mat-card-footer>
      <mat-card-actions>
        <button (click)="onLoginClicked()" mat-flat-button>Login</button>
      </mat-card-actions>
    </mat-card-footer>
  </mat-card>
</div>
